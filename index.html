<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SPRINTER Flow v9.2</title>
<style>
body{margin:0;background:#0f172a;color:white;font-family:sans-serif}
.wrap{max-width:430px;margin:auto;padding:12px}
.screen{display:none}.screen.active{display:block}
.card{background:#1e293b;border-radius:16px;padding:14px;margin-bottom:12px}
button{width:100%;padding:15px;border:none;border-radius:14px;font-weight:bold;font-size:15px;background:#facc15;color:#111;margin-top:8px}
.trainBtns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.bar{height:10px;background:#111827;border-radius:999px;overflow:hidden;margin-top:4px}
.fill{height:100%;background:linear-gradient(90deg,#60a5fa,#facc15)}
.track{position:relative;height:360px;background:#374151;border-radius:14px;overflow:hidden}
.runner{position:absolute;width:26px;height:26px;border-radius:50%;left:8px;transition:left .03s linear}
.finish{position:absolute;top:0;bottom:0;right:18px;width:6px;background:repeating-linear-gradient(45deg,#fff 0,#fff 5px,#000 5px,#000 10px)}
.line{position:absolute;left:0;right:0;height:1px;background:rgba(255,255,255,.25)}
.log{white-space:pre-wrap;line-height:1.5;font-size:13px}
.small{font-size:12px;opacity:.75;line-height:1.5}
.notice{text-align:center;padding:26px 14px}
.notice h1{font-size:28px;margin:0 0 10px}
.notice .rule{font-size:18px;color:#facc15;font-weight:bold}
.entry{background:#111827;border-radius:12px;padding:10px;margin:8px 0;font-size:13px}
.me{border:1px solid #facc15}
</style>
</head>
<body>

<div class="wrap">

<section id="trainScreen" class="screen active">
<div class="card">
<h2>育成</h2>
<div id="weekText"></div>
<div id="stats"></div>
</div>

<div class="card">
<h2>練習</h2>

<div class="trainBtns">
<button onclick="train('start')">スタート</button>
<button onclick="train('form')">フォーム</button>
<button onclick="train('stamina')">持久</button>
<button onclick="train('power')">パワー</button>
<button onclick="train('rest')">休息</button>
</div>

<div class="small">
4週後に大会
</div>

</div>

<div class="card">
<div id="trainLog" class="log">
練習を選択してください
</div>
</div>
</section>

<section id="noticeScreen" class="screen">
<div class="card notice">
<div class="small">大会告知</div>
<h1>県大会 決勝</h1>
<div class="rule">突破条件：2位以内</div>
<p class="small">
4週間の育成結果をもって大会へ挑む
</p>
<button onclick="goEntry()">
次へ
</button>
</div>
</section>

<section id="entryScreen" class="screen">
<div class="card">
<h2>出場選手</h2>

<div class="entry">
1 東海高 速水<br>
前半型 / 好調
</div>

<div class="entry">
2 白峰高 神崎<br>
後半型 / 絶好調
</div>

<div class="entry me">
3 あなた<br>
育成型 / 普通
</div>

<div class="entry">
4 世界学院 レオン<br>
万能型 / 普通
</div>

<button onclick="goMeet()">
レースへ
</button>

</div>
</section>

<section id="meetScreen" class="screen">

<div class="card">

<h2>レース</h2>

<div class="small">
レース進行中...
</div>

</div>

<div class="card">

<div class="track" id="track">

<div class="finish"></div>

<div class="line" style="top:90px"></div>
<div class="line" style="top:180px"></div>
<div class="line" style="top:270px"></div>

</div>

</div>

<div class="card">

<div id="raceLog" class="log">
レース開始...
</div>

<button id="nextBtn" onclick="nextSeason()" style="display:none">
次へ
</button>

</div>

</section>

</div>

<script>

const player={
dash:60,
quick:60,
stamina:60,
form:60,
guts:60,
spurt:60,
fatigue:60,
week:1
};

function show(id){

document.querySelectorAll(".screen").forEach(s=>{
s.classList.remove("active");
});

document.getElementById(id).classList.add("active");

}

function render(){

document.getElementById("weekText").innerHTML=
"第"+player.week+"週";

document.getElementById("stats").innerHTML=`

ダッシュ
<div class="bar"><div class="fill" style="width:${player.dash}%"></div></div>

瞬発
<div class="bar"><div class="fill" style="width:${player.quick}%"></div></div>

スタミナ
<div class="bar"><div class="fill" style="width:${player.stamina}%"></div></div>

フォーム
<div class="bar"><div class="fill" style="width:${player.form}%"></div></div>

根性
<div class="bar"><div class="fill" style="width:${player.guts}%"></div></div>

スパート
<div class="bar"><div class="fill" style="width:${player.spurt}%"></div></div>

疲労:${Math.round(player.fatigue)}

`;

}

function train(type){

let txt="";

if(type==="start"){
player.dash+=3;
player.quick+=3;
player.fatigue+=20;
txt="前半加速が強化された";
}

if(type==="form"){
player.form+=4;
player.fatigue+=14;
txt="フォーム改善";
}

if(type==="stamina"){
player.stamina+=4;
player.fatigue+=16;
txt="中盤維持力アップ";
}

if(type==="power"){
player.guts+=5;
player.spurt+=5;
player.fatigue+=24;
txt="ラストスパート強化";
}

if(type==="rest"){
player.fatigue-=40;

if(player.fatigue<0){
player.fatigue=0;
}

txt="疲労回復";
}

player.week++;

render();

document.getElementById("trainLog").innerText=txt;

if(player.week>4){

show("noticeScreen");

}

}

function goEntry(){

show("entryScreen");

}

function goMeet(){

show("meetScreen");

startRace();

}

function startRace(){

document.getElementById("nextBtn").style.display="none";

const track=document.getElementById("track");

track.querySelectorAll(".runner").forEach(e=>{
e.remove();
});

const racers=[
{x:0,v:0,color:"#60a5fa",type:"front"},
{x:0,v:0,color:"#f472b6",type:"late"},
{x:0,v:0,color:"#facc15",type:"player"},
{x:0,v:0,color:"#22c55e",type:"balance"}
];

racers.forEach((r,i)=>{

const el=document.createElement("div");

el.className="runner";

el.style.top=(i*90+20)+"px";

el.style.background=r.color;

track.appendChild(el);

r.el=el;

});

let timer=setInterval(()=>{

racers.forEach(r=>{

if(r.x>=100) return;

let accel=.3;

if(r.type==="player"){

if(r.x<30){

accel+=(player.dash+player.quick)/200;

}
else if(r.x<70){

accel+=(player.stamina+player.form)/260;

if(player.fatigue>180){

accel-=.4;

}

}
else{

accel+=(player.guts+player.spurt)/220;

}

}

if(r.type==="front"){

if(r.x<40){

accel+=.7;

}
else{

accel-=.15;

}

}

if(r.type==="late"){

if(r.x<60){

accel+=.1;

}
else{

accel+=.8;

}

}

if(r.type==="balance"){

accel+=.35;

}

if(Math.random()<0.02){

accel-=.8;

}

if(Math.random()<0.03){

accel+=1.0;

}

r.v+=accel*.05;

if(r.v<0.5){

r.v=.5;

}

r.x+=r.v;

r.el.style.left=(r.x*3)+"px";

});

if(racers.every(r=>r.x>=100)){

clearInterval(timer);

racers.sort((a,b)=>b.x-a.x);

const rank=racers.findIndex(r=>r.type==="player")+1;

let text="";

if(rank<=2){

text="突破！ 次の大会へ進める";

}
else{

text="敗退…";

}

document.getElementById("raceLog").innerText=
"あなたは"+rank+"位\n\n"+text;

document.getElementById("nextBtn").style.display="block";

}

},30);

}

function nextSeason(){

player.week=1;

show("trainScreen");

render();

document.getElementById("trainLog").innerText=
"次の大会へ向けて育成開始";

}

render();

</script>

</body>
</html>
